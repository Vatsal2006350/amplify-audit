[project]
name = "amplify-audit"
version = "0.3.0"
description = "Data-Spatial Product Quality Analysis — the first open-source product listing linter"
entry = "main.jac"

[server]
port = 8002

[plugins.scale.cors]
allow_origins = ["*"]
allow_methods = ["GET", "POST"]
allow_headers = ["*"]

[plugins.byllm.model]
default_model = "claude-sonnet-4-6"

[plugins.byllm.call_params]
temperature = 0.3
max_tokens = 1024

[plugins.byllm.litellm]
local_cost_map = true
drop_params = true
